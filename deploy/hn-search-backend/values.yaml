replicaCount: 1

# Recreate avoids running two backend pods (and two DB connection pools) at once
# during a deploy, which would exceed the Rivestack DB role's connection limit.
strategy:
  type: Recreate

secret: hn-search-backend-config

image:
  repository: ghcr.io/rivestack/rag-starter/backend
  tag: latest
  pullPolicy: Always

resources:
  limits:
    cpu: '500m'
    memory: '512Mi'
  requests:
    cpu: '250m'
    memory: '256Mi'

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: '600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '600'
  hosts:
    - host: ask-api.rivestack.io
      paths:
        - path: /
          pathType: Prefix
    - host: ask.rivestack.io
      paths:
        - path: /story/
          pathType: Prefix
        - path: /sitemap.xml
          pathType: Exact
  tls:
    - hosts:
        - ask-api.rivestack.io
      secretName: hn-search-backend-tls-prod
    - hosts:
        - ask.rivestack.io
      secretName: hn-search-frontend-tls-prod
